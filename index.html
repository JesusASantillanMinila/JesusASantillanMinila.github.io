<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #007bff; font-weight: bold; }
        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <nav>
        <a href="#" onclick="showTab('bio')">Bio & Links</a>
        <a href="#" onclick="showTab('pics')">Pictures</a>
        <a href="#" onclick="showTab('apps')">Interactive App</a>
    </nav>

    <div id="bio" class="tab-content active">
        <h1>About Me</h1>
        <p>Welcome to my website! I am building this for free using GitHub and Streamlit.</p>
        <h3>Links</h3>
        <ul>
            <li><a href="https://linkedin.com">LinkedIn</a></li>
            <li><a href="https://github.com">GitHub</a></li>
        </ul>
    </div>

    <div id="pics" class="tab-content">
        <h1>Gallery</h1>
        <p>A place for your photos.</p>
        </div>

    <div id="apps" class="tab-content">
        <h1>My Interactive App</h1>
        <iframe src="https://chatbot-opepfv33as.streamlit.app//?embed=true" style="width:100%; height:600px; border:none;"></iframe>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(div => div.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</body>
</html>
