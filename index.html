<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Science Portfolio</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <nav class="nav">
        <a href="#home" class="nav-logo">Data<span class="blink">_</span>Sci</a>
        
        <div class="nav-links">
          <a href="#home">Home</a>
          <a href="#projects">Projects</a>
          <a href="#resume">Resume</a>
          <a href="#contact">Contact</a>
        </div>
        
        <button class="nav-toggle" aria-label="Toggle menu">Menu</button>
      </nav>
    </div>
  </header>

  <main>
    <section id="home" class="section bg-grid hero">
      <div class="container">
        
        <div class="grid grid--2 items-center">
          
          <div class="stack">
            <span class="eyebrow">about_me</span>
            
            <h1>Hi, I'm [Your Name].</h1>
            
            <p class="hero-sub">
              [Placeholder for your short text. I am a Data Scientist specializing in machine learning, data engineering, and translating complex datasets into actionable insights. Welcome to my digital notebook.]
            </p>
            
            <div class="hero-actions">
              <a href="#projects" class="btn btn-primary">Projects</a>
              <a href="#resume" class="btn btn-outline">Resume</a>
            </div>
          </div>

          <div class="text-center">
            <img 
              src="https://via.placeholder.com/500x500/EFEDE7/8A8F98?text=Your+Picture+Here" 
              alt="Profile picture of [Your Name]" 
              style="border-radius: var(--radius-md); border: var(--border-width) solid var(--color-border); width: 100%; max-width: 400px; margin: 0 auto; box-shadow: var(--shadow-sm);"
            />
          </div>

        </div>
      </div>
    </section>
  </main>

</body>
</html>
